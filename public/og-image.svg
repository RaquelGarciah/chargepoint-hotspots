<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="78%" cy="-8%" r="70%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0066FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="8%" cy="110%" r="60%">
      <stop offset="0%" stop-color="#5FA8FF" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#5FA8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#001E2D"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- network hint -->
  <g stroke="#0066FF" stroke-opacity="0.18" stroke-width="2">
    <line x1="120" y1="470" x2="300" y2="380"/>
    <line x1="300" y1="380" x2="430" y2="470"/>
    <line x1="900" y1="150" x2="1040" y2="240"/>
    <line x1="1040" y1="240" x2="980" y2="380"/>
  </g>
  <g fill="#5FA8FF" fill-opacity="0.7">
    <circle cx="120" cy="470" r="5"/>
    <circle cx="300" cy="380" r="6"/>
    <circle cx="430" cy="470" r="4"/>
    <circle cx="900" cy="150" r="5"/>
    <circle cx="1040" cy="240" r="6"/>
    <circle cx="980" cy="380" r="4"/>
  </g>

  <!-- brand -->
  <g transform="translate(96,92)">
    <path d="M0 30 C 22 30, 22 6, 40 2" fill="none" stroke="#0066FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="30" r="6" fill="#0066FF"/>
