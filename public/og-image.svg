    <text x="62" y="26" font-family="'Space Grotesk', Inter, sans-serif" font-size="30" font-weight="700" fill="#eaf2ff">Hotspots</text>
  </g>

  <!-- headline -->
  <text x="92" y="330" font-family="'Space Grotesk', Inter, sans-serif" font-size="84" font-weight="600" letter-spacing="-2" fill="#f4f8ff">Where to put</text>
  <text x="92" y="420" font-family="'Space Grotesk', Inter, sans-serif" font-size="84" font-weight="600" letter-spacing="-2" fill="#0066FF">chargepoints.</text>

  <text x="96" y="500" font-family="Inter, sans-serif" font-size="26" fill="#97a8c6">Data-driven EV charging infrastructure placement for fleet operators.</text>
